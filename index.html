<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公式LINE プレゼント企画</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8edda;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "YuMincho", serif;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      padding: 12px;
      background: rgba(255,250,240,.9);
      border-bottom: 1px solid #d7c3a5;
      backdrop-filter: blur(8px);
    }

    .countdown {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255,250,240,.74);
      color: #52664a;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(78,52,28,.08);
    }

    .card {
      width: min(90vw, 520px);
      padding: 48px 32px;
      border-radius: 24px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(215,195,165,.9);
      box-shadow: 0 14px 34px rgba(78,52,28,.10);
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #20375c;
      font-size: clamp(32px, 7vw, 52px);
      line-height: 1.2;
    }

    p {
      margin-top: 20px;
      color: #786a5b;
      line-height: 1.8;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="countdown">受付終了しました</div>
  </div>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">公式LINE</p>
      <h1>プレゼント企画</h1>
      <p class="hero-copy">
        たくさんのご参加、ありがとうございました。<br>
        応募受付は終了いたしました。
      </p>

      <div class="closed-box">
        ※現在は応募を締め切っております
      </div>
    </section>
  </main>
</body>
</html>
